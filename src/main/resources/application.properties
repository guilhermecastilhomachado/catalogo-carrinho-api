spring.application.name=catalogo_carrinho_api

# MySQL 8+ costuma usar caching_sha2_password; quando conecta sem SSL pode exigir
# permitir recuperação de chave pública (ambiente de DEV).
spring.datasource.url=jdbc:mysql://localhost:3307/catalogo_carrinho?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html